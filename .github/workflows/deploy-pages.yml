name: Deploy Pages

# Publishes the precomputed map in docs/ to GitHub Pages. Does NOT run the
# build script (the isochrones GeoJSON is committed). To refresh the data,
# rerun scripts/build_isochrones.py locally and commit the result.
#
# One-time setup: repo Settings -> Pages -> Source = "GitHub Actions".
# Pages serves from the default branch, so this goes live after merge to main.

on:
  push:
    branches: [main]
    paths:
      - "docs/**"
      - ".github/workflows/deploy-pages.yml"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/configure-pages@v5
        with:
          # Enable Pages (build type: GitHub Actions) on first deploy so the
          # site does not depend on a manual Settings -> Pages toggle.
          enablement: true
      - uses: actions/upload-pages-artifact@v3
        with:
          path: docs
      - id: deployment
        uses: actions/deploy-pages@v4
