name: Build isochrones

# Regenerates docs/isochrones.geojson from OpenRouteService and commits it.
# Run manually from the Actions tab after setting the ORS_API_KEY secret
# (Settings -> Secrets and variables -> Actions). The committed GeoJSON is what
# the Pages site serves, so a push to docs/ triggers the deploy workflow.

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install -r requirements.txt
      - name: Build isochrones
        env:
          ORS_API_KEY: ${{ secrets.ORS_API_KEY }}
        run: python scripts/build_isochrones.py
      - name: Commit regenerated GeoJSON
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          if git diff --quiet -- docs/isochrones.geojson; then
            echo "No change in docs/isochrones.geojson."
          else
            git add docs/isochrones.geojson
            git commit -m "Regenerate isochrones from OpenRouteService"
            git push
          fi
